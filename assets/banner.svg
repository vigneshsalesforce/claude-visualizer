<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Claude Code Visualizer">
  <defs>
    <radialGradient id="bgGlow" cx="18%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0f2438" />
      <stop offset="60%" stop-color="#070a16" />
      <stop offset="100%" stop-color="#050510" />
    </radialGradient>
    <linearGradient id="wordmarkFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#aaeeff" />
    </linearGradient>
    <pattern id="hexGrid" width="42" height="72.7" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <path d="M21 0 L42 12.1 L42 36.3 L21 48.5 L0 36.3 L0 12.1 Z"
        fill="none" stroke="#66ccff" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bgGlow)" />
  <rect width="1200" height="280" fill="url(#hexGrid)" />

  <!-- ambient node-graph motif, right side -->
  <g stroke="#66ccff" stroke-opacity="0.35" stroke-width="1.5">
    <line x1="760" y1="150" x2="860" y2="90" />
    <line x1="760" y1="150" x2="860" y2="150" />
    <line x1="760" y1="150" x2="860" y2="210" />
    <line x1="860" y1="90" x2="960" y2="60" />
    <line x1="860" y1="150" x2="960" y2="150" />
    <line x1="860" y1="210" x2="960" y2="230" />
  </g>
  <g stroke="#cc88ff" stroke-opacity="0.3" stroke-width="1.5">
    <line x1="960" y1="150" x2="1060" y2="110" />
    <line x1="960" y1="150" x2="1060" y2="190" />
  </g>
  <g filter="url(#nodeGlow)">
    <circle cx="760" cy="150" r="6" fill="#66ffaa" />
    <circle cx="860" cy="90" r="5" fill="#66ccff" />
    <circle cx="860" cy="150" r="5" fill="#66ccff" />
    <circle cx="860" cy="210" r="5" fill="#66ccff" />
    <circle cx="960" cy="60" r="4.5" fill="#aaeeff" />
    <circle cx="960" cy="150" r="6" fill="#cc88ff" />
    <circle cx="960" cy="230" r="4.5" fill="#aaeeff" />
    <circle cx="1060" cy="110" r="4.5" fill="#cc88ff" />
    <circle cx="1060" cy="190" r="4.5" fill="#cc88ff" />
  </g>

  <!-- logomark -->
  <g filter="url(#nodeGlow)" transform="translate(60, 82)">
    <polygon points="58,0 116,33.5 116,100.5 58,134 0,100.5 0,33.5"
      fill="#0a0f1e" stroke="#66ccff" stroke-width="6" stroke-linejoin="round" />
    <circle cx="58" cy="67" r="12" fill="#66ffaa" />
  </g>

  <!-- wordmark -->
  <text x="210" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="46" font-weight="700" fill="url(#wordmarkFill)" letter-spacing="1.5">
    CLAUDE CODE VISUALIZER
  </text>
  <text x="212" y="175" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="18" fill="#66ccff" fill-opacity="0.85" letter-spacing="0.5">
    Live timeline &amp; graph view of your Claude Code sessions, in your browser
  </text>
</svg>
