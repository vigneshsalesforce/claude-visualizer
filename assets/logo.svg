<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Claude Code Visualizer logo">
  <title>Claude Code Visualizer</title>
  <defs>
    <radialGradient id="glow" cx="50%" cy="46%" r="60%">
      <stop offset="0%" stop-color="#123047" />
      <stop offset="100%" stop-color="#050510" />
    </radialGradient>
    <linearGradient id="hexStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aaeeff" />
      <stop offset="100%" stop-color="#66ccff" />
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="248" height="248" rx="52" fill="url(#glow)" />
  <rect x="4" y="4" width="248" height="248" rx="52" fill="none" stroke="#1c3a52" stroke-width="2" />

  <!-- edges (node graph) -->
  <g stroke="#66ccff" stroke-opacity="0.55" stroke-width="2.5">
    <line x1="128" y1="128" x2="72" y2="88" />
    <line x1="128" y1="128" x2="184" y2="88" />
    <line x1="128" y1="128" x2="72" y2="176" />
  </g>
  <g stroke="#cc88ff" stroke-opacity="0.55" stroke-width="2.5">
    <line x1="128" y1="128" x2="184" y2="176" />
  </g>

  <!-- satellite nodes -->
  <g filter="url(#softGlow)">
    <circle cx="72" cy="88" r="9" fill="#66ccff" />
    <circle cx="184" cy="88" r="9" fill="#66ccff" />
    <circle cx="72" cy="176" r="9" fill="#cc88ff" />
    <circle cx="184" cy="176" r="9" fill="#cc88ff" />
  </g>

  <!-- central hex node -->
  <g filter="url(#softGlow)">
    <polygon points="128,90 160,109 160,147 128,166 96,147 96,109"
      fill="#0a0f1e" stroke="url(#hexStroke)" stroke-width="5" stroke-linejoin="round" />
    <circle cx="128" cy="128" r="10" fill="#66ffaa" />
  </g>
</svg>
